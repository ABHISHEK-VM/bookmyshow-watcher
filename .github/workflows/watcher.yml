name: Test GitHub Action

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Verify Dart Installation
        run: dart --version

      - name: Run Test Script
        run: dart aries_watcher.dart
